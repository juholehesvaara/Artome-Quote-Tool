<style>
:root{--orange:#ECAA1D;--navy:#154358;--black:#000;--white:#FFF;--dgrey:#262626;--mgrey:#7F7F7F;--lgrey:#D9D9D9;--bg:#F5F5F5}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito Sans',Arial,sans-serif;background:var(--bg);color:var(--dgrey);line-height:1.5}
.topbar{background:var(--white);border-bottom:3px solid var(--orange);padding:12px 24px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100}
.topbar img{height:32px}
.topbar h1{font-weight:900;font-size:18px;color:var(--navy);letter-spacing:.5px}
.main{display:grid;grid-template-columns:1fr 1fr;gap:24px;padding:24px;max-width:1600px;margin:0 auto;padding-bottom:80px}
@media(max-width:1000px){.main{grid-template-columns:1fr}}
.form-pane{display:flex;flex-direction:column;gap:16px}
.preview-pane{position:sticky;top:60px;height:calc(100vh - 84px);overflow:hidden;background:var(--white);border-radius:8px;box-shadow:0 2px 12px rgba(0,0,0,.08);padding:24px;display:flex;flex-direction:column}
.section{background:var(--white);border-radius:8px;box-shadow:0 1px 6px rgba(0,0,0,.06);overflow:hidden}
.section-header{background:var(--navy);color:var(--white);padding:10px 16px;font-weight:700;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;user-select:none}
.section-header .arrow{transition:transform .2s;font-size:12px}
.section-header.collapsed .arrow{transform:rotate(-90deg)}
.section-body{padding:16px;display:flex;flex-direction:column;gap:12px}
.section-body.hidden{display:none}
.field-row{display:flex;gap:12px;flex-wrap:wrap}
.field{flex:1;min-width:160px;display:flex;flex-direction:column;gap:4px}
.field label{font-size:11px;font-weight:700;color:var(--mgrey);text-transform:uppercase;letter-spacing:.5px}
.field input,.field select,.field textarea{border:1px solid var(--lgrey);border-radius:4px;padding:8px 10px;font-family:'Nunito Sans',Arial,sans-serif;font-size:13px;color:var(--dgrey);background:var(--white);transition:border-color .2s}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--orange)}
.field textarea{resize:vertical;min-height:60px}
.field input.invalid{border-color:#e74c3c}
.product-row{background:var(--bg);border-radius:6px;padding:12px;display:flex;flex-direction:column;gap:8px;position:relative;border-left:3px solid var(--orange)}
.product-row .row-top{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap}
.product-row .row-options{display:flex;gap:8px;flex-wrap:wrap}
.remove-btn{background:none;border:none;color:#e74c3c;cursor:pointer;font-size:18px;padding:4px 8px;border-radius:4px}
.remove-btn:hover{background:rgba(231,76,60,.1)}
.btn{border:none;border-radius:4px;padding:10px 20px;font-family:'Nunito Sans',Arial,sans-serif;font-weight:700;font-size:13px;cursor:pointer;transition:all .2s}
.btn-primary{background:var(--orange);color:var(--white)}
.btn-primary:hover{background:#d49a18}
.btn-secondary{background:var(--white);color:var(--navy);border:1px solid var(--lgrey)}
.btn-secondary:hover{background:var(--bg)}
.btn-sm{padding:6px 14px;font-size:12px}
.btn-row{display:flex;gap:8px;flex-wrap:wrap}
.action-bar{position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:2px solid var(--lgrey);padding:12px 24px;display:flex;justify-content:center;gap:12px;z-index:100}
.checkbox-row{display:flex;align-items:center;gap:8px}
.checkbox-row input[type="checkbox"]{accent-color:var(--orange);width:16px;height:16px}
.checkbox-row label{font-size:13px;font-weight:400;text-transform:none;color:var(--dgrey)}
.currency-toggle{display:flex;gap:0;border:1px solid var(--lgrey);border-radius:4px;overflow:hidden}
.currency-toggle button{border:none;padding:8px 16px;font-family:'Nunito Sans',Arial,sans-serif;font-weight:700;font-size:13px;cursor:pointer;background:var(--white);color:var(--dgrey);transition:all .2s}
.currency-toggle button.active{background:var(--navy);color:var(--white)}
.img-upload-area{border:2px dashed var(--lgrey);border-radius:8px;padding:16px;text-align:center;cursor:pointer;transition:border-color .2s;position:relative}
.img-upload-area:hover{border-color:var(--orange)}
.img-upload-area input[type="file"]{position:absolute;inset:0;opacity:0;cursor:pointer}
.img-upload-area img{max-width:100%;max-height:150px;border-radius:4px;margin-top:8px}
.img-upload-area .placeholder{color:var(--mgrey);font-size:12px}
.img-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
/* Preview */
.preview-pane h2{font-size:14px;font-weight:900;color:var(--navy);margin-bottom:12px;padding-bottom:6px;border-bottom:2px solid var(--orange);display:inline-block}
.svc-row{background:var(--bg);border-radius:6px;padding:10px 12px;display:flex;gap:8px;align-items:flex-end;border-left:3px solid var(--mgrey)}
.state-field.hidden{display:none}
.custom-field.hidden{display:none}
.custom-field{margin-top:6px}
</style>
</head>
<body>
<div class="topbar">
  <img id="topbar-logo" alt="Artome">
  <h1>Sales Quote Generator</h1>
</div>
<div class="main">
<div class="form-pane">

  <!-- Seller & Currency -->
  <div class="section">
    <div class="section-header" onclick="toggleSection(this)">Seller & Currency <span class="arrow">&#9660;</span></div>
    <div class="section-body">
      <div class="field-row">
        <div class="field">
          <label>Selling Entity</label>
          <select id="sellerEntity" onchange="applySeller()">
            <option value="artome-oy">Artome Oy</option>
            <option value="artome-usa">Artome USA</option>
          </select>
        </div>
        <div class="field">
          <label>Currency</label>
          <div class="currency-toggle">
            <button id="btnEUR" class="active" onclick="setCurrency('EUR')">EUR</button>
            <button id="btnUSD" onclick="setCurrency('USD')">USD</button>
            <button id="btnGBP" onclick="setCurrency('GBP')">GBP</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Quote Details -->
  <div class="section">
    <div class="section-header" onclick="toggleSection(this)">Quote Details <span class="arrow">&#9660;</span></div>
    <div class="section-body">
      <div class="field-row">
        <div class="field"><label>Date</label><input type="date" id="quoteDate"></div>
        <div class="field"><label>Expiration Date</label><input type="date" id="expirationDate"></div>
      </div>
      <div class="field-row">
        <div class="field" style="flex:2"><label>Quote Name</label><input type="text" id="quoteName" placeholder="e.g. Artome X20 / Scandic Helsinki"></div>
      </div>
      <div class="field-row">
        <div class="field"><label>Sales Rep Name</label><input type="text" id="repName"></div>
        <div class="field"><label>Email</label><input type="email" id="repEmail"></div>
        <div class="field"><label>Phone</label><input type="tel" id="repPhone"></div>
      </div>
    </div>
  </div>

  <!-- Customer Information -->
  <div class="section">
    <div class="section-header" onclick="toggleSection(this)">Customer Information <span class="arrow">&#9660;</span></div>
    <div class="section-body">
      <div class="field-row">
        <div class="field"><label>Customer Name *</label><input type="text" id="customerName" required></div>
        <div class="field"><label>Customer Email</label><input type="email" id="customerEmail"></div>
      </div>
      <div class="field-row">
        <div class="field"><label>Customer Phone</label><input type="tel" id="customerPhone"></div>
        <div class="field"><label>Customer Company</label><input type="text" id="customerCompany"></div>
      </div>
      <div class="field-row">
        <div class="field" style="flex:2"><label>Street Address</label><input type="text" id="customerStreet"></div>
      </div>
      <div class="field-row">
        <div class="field"><label>Zip / Postal Code</label><input type="text" id="customerZip"></div>
        <div class="field"><label>City</label><input type="text" id="customerCity"></div>
        <div class="field state-field"><label>State</label><input type="text" id="customerState" placeholder="e.g. CA"></div>
      </div>
    </div>
  </div>

  <!-- Products -->
  <div class="section">
    <div class="section-header" onclick="toggleSection(this)">Products <span class="arrow">&#9660;</span></div>
    <div class="section-body">
      <div id="productRows"></div>
      <div class="btn-row">
        <button class="btn btn-primary btn-sm" onclick="addProductRow()">+ Add Product</button>
        <button class="btn btn-secondary btn-sm" onclick="addProductRow(true)">+ Custom Line</button>
      </div>
    </div>
  </div>

  <!-- Totals -->
  <div class="section">
    <div class="section-header" onclick="toggleSection(this)">Pricing <span class="arrow">&#9660;</span></div>
    <div class="section-body">
      <div class="field-row">
        <div class="field" style="max-width:120px"><label>Sales Tax (%)</label><input type="number" id="taxRate" value="25.5" min="0" max="100" step="0.1"></div>
        <div class="field" style="max-width:160px"><label>Shipping</label><input type="number" id="shippingPrice" value="0" min="0" step="0.01"></div>
      </div>
    </div>
  </div>

  <!-- Optional Services -->
  <div class="section">
    <div class="section-header" onclick="toggleSection(this)">Optional Services <span class="arrow">&#9660;</span></div>
    <div class="section-body">
      <div id="serviceRows"></div>
      <button class="btn btn-secondary btn-sm" onclick="addServiceRow()">+ Add Service</button>
    </div>
  </div>

  <!-- Delivery & Terms -->
  <div class="section">
    <div class="section-header" onclick="toggleSection(this)">Delivery & Terms <span class="arrow">&#9660;</span></div>
    <div class="section-body">
      <div class="field-row">
        <div class="field" style="flex:2"><label>Delivery Street Address</label><input type="text" id="deliveryStreet"></div>
      </div>
      <div class="field-row">
        <div class="field"><label>Zip / Postal Code</label><input type="text" id="deliveryZip"></div>
        <div class="field"><label>City</label><input type="text" id="deliveryCity"></div>
        <div class="field state-field"><label>State</label><input type="text" id="deliveryState" placeholder="e.g. CA"></div>
      </div>
      <div class="field-row">
        <div class="field"><label>Delivery Term (Incoterm)</label>
          <select id="deliveryTerm">
            <option value="DDP">DDP — Delivered Duty Paid</option>
            <option value="DAP">DAP — Delivered at Place</option>
            <option value="CIF">CIF — Cost, Insurance & Freight</option>
            <option value="FOB">FOB — Free on Board</option>
            <option value="EXW">EXW — Ex Works</option>
            <option value="FCA">FCA — Free Carrier</option>
            <option value="CPT">CPT — Carriage Paid To</option>
            <option value="CIP">CIP — Carriage & Insurance Paid To</option>
          </select>
        </div>
        <div class="field"><label>Delivery Time</label>
          <select id="deliveryTime" onchange="toggleCustomField(this,'deliveryTimeCustom')">
            <option value="Within 2 weeks of confirmed PO">2 weeks</option>
            <option value="Within 4 weeks of confirmed PO" selected>4 weeks</option>
            <option value="Within 6 weeks of confirmed PO">6 weeks</option>
            <option value="Within 8 weeks of confirmed PO">8 weeks</option>
            <option value="Within 12 weeks of confirmed PO">12 weeks</option>
            <option value="To be confirmed">To be confirmed</option>
            <option value="__custom__">Other…</option>
          </select>
          <input type="text" id="deliveryTimeCustom" class="custom-field hidden" placeholder="Enter custom delivery time">
        </div>
      </div>
      <div class="field-row">
        <div class="field"><label>Payment Terms</label>
          <select id="paymentTerms" onchange="toggleCustomField(this,'paymentTermsCustom')">
            <option value="100% advance payment">100% advance payment</option>

// === UTILITY ===
function fmtPrice(val){
  const n=Number(val)||0;
  if(n===0&&productRows.some(r=>calcRowPrice(r)===0)) return 'FREE';
  if(currency==='USD') return '$'+n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');
  if(currency==='GBP') return '\u00A3'+n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');
  const parts=n.toFixed(2).split('.');
  return parts[0].replace(/\B(?=(\d{3})+(?!\d))/g,'\u00A0')+','+parts[1]+' EUR';
}
function fmtPriceVal(val){
  const n=Number(val)||0;
  if(currency==='USD') return '$'+n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');
  if(currency==='GBP') return '\u00A3'+n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');
  const parts=n.toFixed(2).split('.');
  return parts[0].replace(/\B(?=(\d{3})+(?!\d))/g,'\u00A0')+','+parts[1]+' EUR';
}
function fmtPricePdf(val){
  const n=Number(val)||0;
  if(currency==='USD') return '$ '+n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');
  if(currency==='GBP') return '\u00A3 '+n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');
  const parts=n.toFixed(2).split('.');
  return parts[0].replace(/\B(?=(\d{3})+(?!\d))/g,' ')+','+parts[1]+' EUR';
}
function today(){return new Date().toISOString().split('T')[0];}
function addDays(d,n){const x=new Date(d);x.setDate(x.getDate()+n);return x.toISOString().split('T')[0];}
function esc(s){return(s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;');}

function toggleSection(h){h.classList.toggle('collapsed');h.nextElementSibling.classList.toggle('hidden');}

// === CURRENCY ===
function setCurrency(c){
  currency=c;
  document.getElementById('btnEUR').classList.toggle('active',c==='EUR');
  document.getElementById('btnUSD').classList.toggle('active',c==='USD');
  document.getElementById('btnGBP').classList.toggle('active',c==='GBP');
  updateStateFields();
  renderProductRows();updatePreview();
}

// === SELLER ===
function applySeller(){
  const s=SELLERS[document.getElementById('sellerEntity').value];
  if(!s)return;
  setCurrency(s.cur);
  document.getElementById('taxRate').value=s.tax;
  updateStateFields();
  updatePreview();
}
function updateStateFields(){
  const show=currency==='USD';
  document.querySelectorAll('.state-field').forEach(el=>el.classList.toggle('hidden',!show));
}

function toggleCustomField(sel,customId){
  const inp=document.getElementById(customId);
  if(sel.value==='__custom__'){inp.classList.remove('hidden');inp.focus();}
  else{inp.classList.add('hidden');inp.value='';}
}
function getFieldValue(selectId,customId){
  const sel=document.getElementById(selectId);
  if(sel.value==='__custom__')return document.getElementById(customId).value;
  return sel.value;
}

// === IMAGE UPLOAD ===
function handleImageUpload(e,key){
  const file=e.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=function(ev){
    uploadedImages[key]=ev.target.result;
    // Show preview
    const area=e.target.parentElement;
    let img=area.querySelector('img');
    if(!img){img=document.createElement('img');area.appendChild(img);}
    img.src=ev.target.result;
    area.querySelector('.placeholder').textContent=file.name;
  };
  reader.readAsDataURL(file);
}

// === PRODUCT ROWS ===
function addProductRow(isCustom=false){
  rowCounter++;
  productRows.push({id:rowCounter,sku:'',custom:isCustom,customName:'',customDesc:'',qty:1,priceOverride:null,cabinetColor:'',doorColor:'',lens:'',isFree:false});
  renderProductRows();updatePreview();
}
function removeProductRow(id){productRows=productRows.filter(r=>r.id!==id);renderProductRows();updatePreview();}
function getRow(id){return productRows.find(r=>r.id===id);}
function updateRow(id,field,value){
  const r=getRow(id);if(!r)return;
  if(field==='qty')r.qty=Math.max(1,parseInt(value)||1);
  else if(field==='priceOverride')r.priceOverride=parseFloat(value);
  else if(field==='isFree')r.isFree=value;
  else r[field]=value;
  if(field==='sku'){r.cabinetColor='';r.doorColor='';r.lens='';r.priceOverride=null;r.isFree=false;}
  renderProductRows();updatePreview();
}
function calcRowPrice(r){
  if(r.isFree)return 0;
  if(r.priceOverride!==null&&r.priceOverride!==undefined&&!isNaN(r.priceOverride))return r.priceOverride;
  const p=PRODUCTS[r.sku];if(!p)return 0;
  let price=p.price;
  if(p.options.cabinetColor&&r.cabinetColor){const o=p.options.cabinetColor.find(x=>x.code===r.cabinetColor);if(o)price+=o.adj;}
  if(p.options.doorColor&&r.doorColor){const o=p.options.doorColor.find(x=>x.code===r.doorColor);if(o)price+=o.adj;}
  if(p.options.lens&&r.lens){const o=p.options.lens.find(x=>x.code===r.lens);if(o)price+=o.adj;}
  return price;
}
function renderProductRows(){
  const c=document.getElementById('productRows');c.innerHTML='';
  productRows.forEach(row=>{
    const div=document.createElement('div');div.className='product-row';
    if(row.custom){
      div.innerHTML=`
        <div class="row-top">
          <div class="field"><label>SKU</label><input type="text" value="${esc(row.sku)}" onchange="updateRow(${row.id},'sku',this.value)" style="width:80px"></div>
          <div class="field" style="flex:2"><label>Product / Service</label><input type="text" value="${esc(row.customName)}" onchange="updateRow(${row.id},'customName',this.value)"></div>
          <div class="field" style="max-width:60px"><label>Qty</label><input type="number" value="${row.qty}" min="1" onchange="updateRow(${row.id},'qty',this.value)"></div>
          <div class="field" style="max-width:120px"><label>Price</label><input type="number" value="${row.priceOverride||0}" min="0" step="0.01" onchange="updateRow(${row.id},'priceOverride',this.value)"></div>
          <div class="checkbox-row" style="padding-bottom:4px"><input type="checkbox" ${row.isFree?'checked':''} onchange="updateRow(${row.id},'isFree',this.checked)"><label>FREE</label></div>
          <button class="remove-btn" onclick="removeProductRow(${row.id})">&times;</button>
        </div>`;
    } else {
      let opts='<select onchange="updateRow('+row.id+',\'sku\',this.value)"><option value="">— Select —</option>';
      CATALOG.forEach(cat=>{opts+=`<optgroup label="${cat.category}">`;cat.products.forEach(p=>{opts+=`<option value="${p.sku}" ${row.sku===p.sku?'selected':''}>${p.name}</option>`;});opts+='</optgroup>';});
      opts+='</select>';
      const prod=PRODUCTS[row.sku];let optsHTML='';
      if(prod&&prod.options){
        if(prod.options.cabinetColor){optsHTML+=`<div class="field"><label>Cabinet</label><select onchange="updateRow(${row.id},'cabinetColor',this.value)"><option value="">—</option>${prod.options.cabinetColor.map(o=>`<option value="${o.code}" ${row.cabinetColor===o.code?'selected':''}>${o.name}</option>`).join('')}</select></div>`;}
        if(prod.options.doorColor){optsHTML+=`<div class="field"><label>Door</label><select onchange="updateRow(${row.id},'doorColor',this.value)"><option value="">—</option>${prod.options.doorColor.map(o=>`<option value="${o.code}" ${row.doorColor===o.code?'selected':''}>${o.name}${o.adj?' (+'+o.adj+')':''}</option>`).join('')}</select></div>`;}
        if(prod.options.lens){optsHTML+=`<div class="field"><label>Lens</label><select onchange="updateRow(${row.id},'lens',this.value)"><option value="">—</option>${prod.options.lens.map(o=>`<option value="${o.code}" ${row.lens===o.code?'selected':''}>${o.name}${o.adj?' (+'+o.adj+')':''}</option>`).join('')}</select></div>`;}
      }
      const price=calcRowPrice(row);
      div.innerHTML=`
        <div class="row-top">
          <div class="field" style="flex:2"><label>Product</label>${opts}</div>
          <div class="field" style="max-width:60px"><label>Qty</label><input type="number" value="${row.qty}" min="1" onchange="updateRow(${row.id},'qty',this.value)"></div>
          <div class="field" style="max-width:120px"><label>Price</label><input type="number" value="${price}" min="0" step="0.01" onchange="updateRow(${row.id},'priceOverride',this.value)"></div>
          <div class="checkbox-row" style="padding-bottom:4px"><input type="checkbox" ${row.isFree?'checked':''} onchange="updateRow(${row.id},'isFree',this.checked)"><label>FREE</label></div>
          <button class="remove-btn" onclick="removeProductRow(${row.id})">&times;</button>
        </div>
        ${optsHTML?'<div class="row-options">'+optsHTML+'</div>':''}`;
    }
    c.appendChild(div);
  });
}

// === SERVICE ROWS ===
function addServiceRow(){
  svcCounter++;
  serviceRows.push({id:svcCounter,desc:'',price:0});
  renderServiceRows();updatePreview();
}
function removeServiceRow(id){serviceRows=serviceRows.filter(r=>r.id!==id);renderServiceRows();updatePreview();}
function updateService(id,field,val){
  const r=serviceRows.find(s=>s.id===id);if(!r)return;
  if(field==='price')r.price=parseFloat(val)||0; else r[field]=val;
  updatePreview();
}
function renderServiceRows(){
  const c=document.getElementById('serviceRows');c.innerHTML='';
  serviceRows.forEach(r=>{
    const div=document.createElement('div');div.className='svc-row';
    div.innerHTML=`<div class="field" style="flex:2"><label>Service</label><input type="text" value="${esc(r.desc)}" onchange="updateService(${r.id},'desc',this.value)"></div>
      <div class="field" style="max-width:120px"><label>Price</label><input type="number" value="${r.price}" min="0" step="0.01" onchange="updateService(${r.id},'price',this.value)"></div>
      <button class="remove-btn" onclick="removeServiceRow(${r.id})">&times;</button>`;
    c.appendChild(div);
  });
}

// === CALCULATIONS ===
function calcTotals(){
  let subtotal=0;
  productRows.forEach(r=>{subtotal+=calcRowPrice(r)*r.qty;});
  const shipping=parseFloat(document.getElementById('shippingPrice').value)||0;
  const taxRate=parseFloat(document.getElementById('taxRate').value)||0;
  const totalBeforeTax=subtotal;
  const tax=totalBeforeTax*taxRate/100;
  const totalAfterTax=totalBeforeTax+tax+shipping;
  return{subtotal,shipping,taxRate,tax,totalAfterTax};
}

// === LIVE PREVIEW (real PDF in iframe) ===
let _prevBlobUrl=null;
let _previewTimer;
function debouncedPreview(){clearTimeout(_previewTimer);_previewTimer=setTimeout(updatePreview,800);}
async function updatePreview(){
  if(!window.jspdf)return;
  const loading=document.getElementById('previewLoading');
  loading.style.display='block';
  try{
    const doc=await buildPDF();
    if(_prevBlobUrl)URL.revokeObjectURL(_prevBlobUrl);
    _prevBlobUrl=doc.output('bloburi');
    document.getElementById('pdfPreview').src=_prevBlobUrl;
  }catch(e){console.error('Preview error:',e);}
  finally{loading.style.display='none';}
}

// === PDF GENERATION ===
async function generatePDF(){
  if(!window.jspdf){alert('PDF library not loaded. Check your internet connection and reload.');return;}
  const customerName=document.getElementById('customerName').value.trim();
  if(!customerName){document.getElementById('customerName').classList.add('invalid');document.getElementById('customerName').focus();alert('Please enter a customer name.');return;}
  document.getElementById('customerName').classList.remove('invalid');
  if(productRows.length===0){alert('Please add at least one product.');return;}
  const doc=await buildPDF();
  const quoteName=document.getElementById('quoteName').value;
  const fn='Artome-Quote-'+(quoteName||'Quote').replace(/[^a-zA-Z0-9]/g,'_')+'.pdf';
  doc.save(fn);
}

// === BUILD PDF DOCUMENT ===
async function buildPDF(){
  const{jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  const W=210,H=297;
  const ML=15,MR=15;
  const CW=W-ML-MR;
  const seller=SELLERS[document.getElementById('sellerEntity').value]||SELLERS['artome-oy'];
  const customerName=document.getElementById('customerName').value.trim();
  const totals=calcTotals();
  const FOOTER_Y=H-22;
  const SAFE_Y=FOOTER_Y-4;

  function buildAddress(prefix){
    const street=document.getElementById(prefix+'Street').value.trim();
    const zip=document.getElementById(prefix+'Zip').value.trim();
    const city=document.getElementById(prefix+'City').value.trim();
    const state=document.getElementById(prefix+'State').value.trim();
    if(!street&&!zip&&!city)return '';
    let addr=street;
    if(zip||city||state){
      if(addr)addr+=', ';
      if(currency==='USD'){
        const parts=[];
        if(city)parts.push(city);
        if(state&&city)parts[parts.length-1]+=' '+state;
        else if(state)parts.push(state);
        if(zip)parts.push(zip);
        addr+=parts.join(' ');
      } else {
        const parts=[];
        if(zip&&city)parts.push(zip+' '+city);
        else if(zip)parts.push(zip);
        else if(city)parts.push(city);
        addr+=parts.join(' ');
      }
    }
    return addr;
  }

  function getImageDims(dataUrl){
    return new Promise(resolve=>{
      const img=new Image();
      img.onload=()=>resolve({w:img.naturalWidth,h:img.naturalHeight});
      img.onerror=()=>resolve({w:4,h:3});
      img.src=dataUrl;
    });
  }
  function fitImage(natW,natH,boxW,boxH){
    const ratio=natW/natH;
    let w=boxW,h=boxW/ratio;
    if(h>boxH){h=boxH;w=boxH*ratio;}
    return{w,h};
  }

  function formatDate(d){try{const p=new Date(d+'T00:00:00');return p.toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});}catch(e){return d;}}
  function formatDateShort(d){try{const p=new Date(d+'T00:00:00');return p.toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'});}catch(e){return d;}}

  // --- Laserline helper (line + dot) ---
  function drawLaserline(x,lineY,lineW){
    doc.setDrawColor(...C.ORANGE);doc.setLineWidth(0.6);
    doc.line(x,lineY,x+lineW,lineY);
    doc.setFillColor(...C.ORANGE);doc.circle(x+lineW+1,lineY,0.7,'F');
  }

  // --- Pill / badge helper ---
  function drawPill(x,pillY,w,h,bgColor,label,val){
    doc.setFillColor(...bgColor);
    const r=h/2;
    doc.roundedRect(x,pillY,w,h,r,r,'F');
    const textY=pillY+h/2+1.2;
    doc.setFont('helvetica','normal');doc.setFontSize(7.5);doc.setTextColor(...C.WHITE);
    doc.text(label,x+r+1,textY);
    doc.setFont('helvetica','bold');doc.setFontSize(9);doc.setTextColor(...C.WHITE);
    doc.text(val,x+w-r-1,textY,{align:'right'});
  }

  // --- Footer with page numbers ---
  let totalPages=1;
  function drawFooter(pageNum){
    // Orange laserline
    drawLaserline(ML,FOOTER_Y,CW-3);
    // Company info left
    doc.setFont('helvetica','bold');doc.setFontSize(7);doc.setTextColor(...C.DGREY);
    doc.text(seller.name,ML,FOOTER_Y+5);
    doc.setFont('helvetica','normal');doc.setFontSize(6.5);doc.setTextColor(...C.MGREY);
    doc.text(seller.addr1,ML,FOOTER_Y+8.5);
    doc.text(seller.web,ML,FOOTER_Y+12);
    // Black logo right
    try{doc.addImage(LOGO_BLACK_B64,'PNG',W-MR-35,FOOTER_Y+2,32,32*(110/600));}catch(e){}
    // Page number bottom right
    doc.setFont('helvetica','normal');doc.setFontSize(7);doc.setTextColor(...C.MGREY);
    doc.text('Page '+pageNum,W-MR,FOOTER_Y+16,{align:'right'});
  }

  function newPage(){doc.addPage();return doc.getNumberOfPages();}
  function ensureSpace(need){if(y+need>SAFE_Y){const pg=newPage();y=20;return true;}return false;}

  // ===================== PAGE 1 =====================
  let y=15;

  // -- Top: Seller info (small, top-left) --
  doc.setFont('helvetica','bold');doc.setFontSize(7);doc.setTextColor(...C.NAVY);
  doc.text(seller.name,ML,y);
  doc.setFont('helvetica','normal');doc.setFontSize(6.5);doc.setTextColor(...C.MGREY);
  y+=3; doc.text(seller.addr1,ML,y);
  if(seller.addr2){y+=2.5; doc.text(seller.addr2,ML,y);}
  y+=2.5; doc.text(seller.web,ML,y);

  // -- "Quotation" heading + laserline --
  y+=10;
  doc.setFont('helvetica','bold');doc.setFontSize(22);doc.setTextColor(...C.NAVY);
  doc.text('Quotation',ML,y);
  const headW=doc.getTextWidth('Quotation');
  drawLaserline(ML,y+2.5,headW);

  // -- Date + Quote Name line --
  y+=10;
  doc.setFont('helvetica','normal');doc.setFontSize(8.5);doc.setTextColor(...C.MGREY);
  const dateStr=formatDate(document.getElementById('quoteDate').value);
  doc.text(dateStr,ML,y);
  const quoteName=document.getElementById('quoteName').value;
  if(quoteName){
    const qnLabel='Quote: ';
    const qnX=ML+70;
    doc.setFont('helvetica','bold');doc.setFontSize(9);doc.setTextColor(...C.NAVY);
    doc.text(qnLabel+quoteName,qnX,y);
  }

  // ============================================
  // Customer Details + Sales Rep — side-by-side gray card boxes
  // ============================================
  y+=7;
  const cardTop=y;
  const cardW=(CW-6)/2; // two cards with 6mm gap
  const cardPad=5;       // inner padding
  const cardBg=[245,245,245];

  // -- Gather customer data --
  const custData=[
    ['Name',customerName],
    ['Company',document.getElementById('customerCompany').value],
    ['Email',document.getElementById('customerEmail').value],
    ['Phone',document.getElementById('customerPhone').value],
    ['Address',buildAddress('customer')],
  ].filter(([,v])=>v);

  // -- Gather rep data --
  const repName=document.getElementById('repName').value;
  const repEmail=document.getElementById('repEmail').value;
  const repPhone=document.getElementById('repPhone').value;
  const repData=[
    ['Name',repName],
    ['Email',repEmail],
    ['Phone',repPhone],
  ].filter(([,v])=>v);

  // Calculate card height based on content (label-value pairs)
  const lineH=4.2;
  const custH=Math.max(cardPad*2+5+custData.length*lineH, 30);
  const repH=Math.max(cardPad*2+5+repData.length*lineH, 30);
  const cardH=Math.max(custH,repH);

  // Draw Customer Details card
  doc.setFillColor(...cardBg);
  doc.roundedRect(ML,cardTop,cardW,cardH,2,2,'F');
  let cy=cardTop+cardPad;
  doc.setFont('helvetica','bold');doc.setFontSize(8.5);doc.setTextColor(...C.NAVY);
  doc.text('Customer Details',ML+cardPad,cy+3);
  cy+=7;
  custData.forEach(([label,val])=>{
    doc.setFont('helvetica','normal');doc.setFontSize(7.5);doc.setTextColor(...C.MGREY);
    doc.text(label,ML+cardPad,cy+3);
    doc.setFont('helvetica','normal');doc.setFontSize(7.5);doc.setTextColor(...C.DGREY);
    // Truncate long values
    const maxValW=cardW-cardPad*2-28;
    let dispVal=val;
    while(doc.getTextWidth(dispVal)>maxValW&&dispVal.length>3){dispVal=dispVal.slice(0,-1);}
    if(dispVal!==val)dispVal+='…';
    doc.text(dispVal,ML+cardPad+28,cy+3);
    cy+=lineH;
  });

  // Draw Sales Rep card
  const repX=ML+cardW+6;
  doc.setFillColor(...cardBg);
  doc.roundedRect(repX,cardTop,cardW,cardH,2,2,'F');
  let ry=cardTop+cardPad;
  doc.setFont('helvetica','bold');doc.setFontSize(8.5);doc.setTextColor(...C.NAVY);
  doc.text('Sales Representative',repX+cardPad,ry+3);
  ry+=7;
  repData.forEach(([label,val])=>{
    doc.setFont('helvetica','normal');doc.setFontSize(7.5);doc.setTextColor(...C.MGREY);
    doc.text(label,repX+cardPad,ry+3);
    doc.setFont('helvetica','normal');doc.setFontSize(7.5);doc.setTextColor(...C.DGREY);
    const maxValW=cardW-cardPad*2-28;
    let dispVal=val;
    while(doc.getTextWidth(dispVal)>maxValW&&dispVal.length>3){dispVal=dispVal.slice(0,-1);}
    if(dispVal!==val)dispVal+='…';
    if(label==='Email'){
      doc.setTextColor(0,80,180);
      doc.textWithLink(dispVal,repX+cardPad+28,ry+3,{url:'mailto:'+val});
      doc.setTextColor(...C.DGREY);
    } else {
      doc.text(dispVal,repX+cardPad+28,ry+3);
    }
    ry+=lineH;
  });

  y=cardTop+cardH+8;

  // ============================================
  // Product Table (simplified: SKU, Product/Service, Price, Qty, Subtotal)
  // ============================================
  const tableHead=['SKU','Product or Service','Price','Qty','Subtotal'];
  const colStyles={
    0:{cellWidth:22},
    1:{cellWidth:'auto'},
    2:{halign:'right',cellWidth:24},
    3:{halign:'center',cellWidth:12},
    4:{halign:'right',cellWidth:26},
  };

  const tableBody=productRows.map(r=>{
    const nm=r.custom?(r.customName||'Custom item'):(PRODUCTS[r.sku]?.name||'');
    const sku=r.custom?r.sku:(r.sku||'');
    const price=calcRowPrice(r);
    const sub=price*r.qty;
    const pStr=r.isFree?'FREE':fmtPricePdf(price);
    const sStr=r.isFree?'FREE':fmtPricePdf(sub);
    // Append config details if present
    let desc=nm;
    const extras=[];
    if(r.cabinetColor)extras.push('Cabinet: '+r.cabinetColor);
    if(r.doorColor)extras.push('Door: '+r.doorColor);
    if(r.lens)extras.push('Lens: '+r.lens);
    if(extras.length>0)desc+='\n'+extras.join(' · ');
    return [sku,desc,pStr,String(r.qty),sStr];
  });

  doc.autoTable({
    startY:y,
    head:[tableHead],
    body:tableBody,
    headStyles:{fillColor:C.NAVY,textColor:C.WHITE,fontStyle:'bold',fontSize:7.5,cellPadding:{top:2.5,right:2,bottom:2.5,left:3}},
    bodyStyles:{fontSize:8,textColor:C.DGREY,cellPadding:{top:2.5,right:2,bottom:2.5,left:3}},
    columnStyles:colStyles,
    margin:{left:ML,right:MR},
    styles:{font:'helvetica',overflow:'linebreak'},
    theme:'plain',
    didParseCell:function(data){
      if(data.section==='head'){data.cell.styles.lineWidth=0;}
      if(data.section==='body'){
        data.cell.styles.lineWidth={bottom:0.15,top:0,left:0,right:0};
        data.cell.styles.lineColor=[217,217,217];
      }
    },
    willDrawCell:function(data){
      if(data.section==='body'&&data.row.index%2===1){
        doc.setFillColor(248,248,248);
        doc.rect(data.cell.x,data.cell.y,data.cell.width,data.cell.height,'F');
      }
    },
  });

  y=doc.autoTable.previous.finalY+5;

  // ============================================
  // Totals — right-aligned lines, then pill badges
  // ============================================
  const totRightX=W-MR;
  const totLeftX=W-MR-65;

  // Subtotal + tax + shipping lines
  function drawTotLine(label,val,opts){
    opts=opts||{};
    ensureSpace(6);
    doc.setFont('helvetica',opts.bold?'bold':'normal');
    doc.setFontSize(8.5);
    doc.setTextColor(...C.DGREY);
    doc.text(label,totLeftX,y);
    doc.text(val,totRightX,y,{align:'right'});

  drawTotLine('Subtotal',fmtPricePdf(totals.subtotal),{});
  if(totals.taxRate>0)drawTotLine('Sales Tax ('+totals.taxRate.toFixed(1)+'%)',fmtPricePdf(totals.tax),{});
  if(totals.shipping>0)drawTotLine('Shipping',fmtPricePdf(totals.shipping),{});

  // "Total After Taxes" navy pill

  const pillW=72;

  // --- Optional Services ---
  const svcTotal=serviceRows.reduce((sum,s)=>sum+(s.desc?s.price:0),0);
  if(serviceRows.length>0&&serviceRows.some(s=>s.desc)){

    y+=2;
    doc.setFont('helvetica','bold');doc.setFontSize(8.5);doc.setTextColor(...C.NAVY);
    doc.text('Optional Services',totLeftX,y);y+=5;
    serviceRows.forEach(s=>{
      if(!s.desc)return;
      doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(...C.DGREY);
      doc.text(s.desc,totLeftX,y);
      doc.text(fmtPricePdf(s.price),totRightX,y,{align:'right'});

    y+=2;

    drawPill(totRightX-pillW,y,pillW,pillH,C.ORANGE,'Total incl. Services',fmtPricePdf(grandTotal));
    y+=pillH+3;
  }

  // ============================================
  // Delivery Details — headed section with laserline
  // ============================================
  y+=6;
  ensureSpace(30);
  doc.setFont('helvetica','bold');doc.setFontSize(13);doc.setTextColor(...C.NAVY);
  doc.text('Delivery Details',ML,y);
  const ddW=doc.getTextWidth('Delivery Details');
  drawLaserline(ML,y+2.5,ddW);
  y+=10;

  const termsUrl=document.getElementById('termsUrl').value;
  const deliveryIncoterm=document.getElementById('deliveryTerm').value;
  const deliveryTime=getFieldValue('deliveryTime','deliveryTimeCustom');
  const deliveryTermStr=deliveryIncoterm+(deliveryTime?', '+deliveryTime:'');
  const paymentTerms=getFieldValue('paymentTerms','paymentTermsCustom');
  const deliveryPairs=[
    ['Delivery Address',buildAddress('delivery')],
    ['Delivery Term',deliveryTermStr],
    ['Payment Terms',paymentTerms],
    ['Quote Expiration',document.getElementById('expirationDate').value?'This Quote will expire on '+formatDateShort(document.getElementById('expirationDate').value)+'.':''],
    ['Terms & Conditions',termsUrl],
  ];
  deliveryPairs.forEach(([label,val])=>{
    if(!val)return;
    ensureSpace(8);
    doc.setFont('helvetica','bold');doc.setFontSize(8);doc.setTextColor(...C.NAVY);

      doc.textWithLink(val,ML+42,y,{url:url});
    } else {
      doc.setTextColor(...C.DGREY);
      const valLines=doc.splitTextToSize(val,CW-45);
      doc.text(valLines,ML+42,y);
    }

  // Additional notes
  const notes=document.getElementById('additionalNotes').value.trim();
  if(notes){
    ensureSpace(14);
    y+=3;
    doc.setFont('helvetica','bold');doc.setFontSize(8);doc.setTextColor(...C.NAVY);
    doc.text('Notes',ML,y);
    doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(...C.DGREY);
    const nl=doc.splitTextToSize(notes,CW-45);
    doc.text(nl,ML+42,y);
    y+=nl.length*4+2;
  }

  // ============================================
  // Product Showcase page
  // ============================================
  if(document.getElementById('includePage2').checked){
    const hasAnyImage=Object.values(uploadedImages).some(v=>v);
    if(hasAnyImage){
      newPage();
      let py=20;
      const mainTitle=document.getElementById('mainImageTitle').value||'Integration Example';

      if(uploadedImages.mainImage){
        doc.setFont('helvetica','bold');doc.setFontSize(14);doc.setTextColor(...C.NAVY);
        doc.text(mainTitle,ML,py);
        drawLaserline(ML,py+2.5,doc.getTextWidth(mainTitle));
        py+=8;
        try{
          const maxBoxH=Math.min(125,SAFE_Y-py-55);
          const dims=await getImageDims(uploadedImages.mainImage);
          const fit=fitImage(dims.w,dims.h,CW,maxBoxH);
          const imgX=ML+(CW-fit.w)/2;
          doc.addImage(uploadedImages.mainImage,'JPEG',imgX,py,fit.w,fit.h,undefined,'MEDIUM');
          py+=fit.h+10;
        }catch(e){py+=10;}
      }

      // Grid images
      const gridImgs=['gridImg1','gridImg2','gridImg3','gridImg4'];
      const gridCaps=['gridCap1','gridCap2','gridCap3','gridCap4'];
      const activeGridImgs=gridImgs.filter(k=>uploadedImages[k]);
      if(activeGridImgs.length>0){
        const gridTitle=document.getElementById('gridTitle').value||'Products';
        if(py+65>SAFE_Y){newPage();py=20;}
        doc.setFont('helvetica','bold');doc.setFontSize(12);doc.setTextColor(...C.NAVY);
        doc.text(gridTitle,ML,py);
        drawLaserline(ML,py+2.5,doc.getTextWidth(gridTitle));
        py+=8;

        const colW=(CW-10)/2;
        const maxGridH=Math.min(55,SAFE_Y-py-10);

        for(let i=0;i<activeGridImgs.length;i++){
          const k=activeGridImgs[i];
          const col=i%2,row=Math.floor(i/2);
          const cx=ML+col*(colW+10);
          const gridCY=py+row*(maxGridH+14);
          if(gridCY+maxGridH+8>SAFE_Y)continue;
          try{
            const dims=await getImageDims(uploadedImages[k]);
            const fit=fitImage(dims.w,dims.h,colW,maxGridH);
            const imgX=cx+(colW-fit.w)/2;
            doc.addImage(uploadedImages[k],'JPEG',imgX,gridCY,fit.w,fit.h,undefined,'MEDIUM');
            const origIdx=gridImgs.indexOf(k);
            const cap=document.getElementById(gridCaps[origIdx]).value;
            if(cap){
              doc.setFont('helvetica','bold');doc.setFontSize(8);doc.setTextColor(...C.DGREY);
              doc.text(cap,cx,gridCY+fit.h+4);
            }
          }catch(e){}
        }
      }
    }
  }

  // ============================================
  // Draw footers on ALL pages (with page numbers)
  // ============================================
  totalPages=doc.getNumberOfPages();
  for(let p=1;p<=totalPages;p++){
    doc.setPage(p);
    drawFooter(p);
  }

  return doc;
}

// === LOCALSTORAGE ===
function getFormState(){
  const fields=['quoteDate','expirationDate','quoteName','repName','repEmail','repPhone',
    'customerName','customerEmail','customerPhone','customerCompany',
    'customerStreet','customerZip','customerCity','customerState',
    'taxRate','shippingPrice',
    'deliveryStreet','deliveryZip','deliveryCity','deliveryState',
    'deliveryTerm','deliveryTime','deliveryTimeCustom','paymentTerms','paymentTermsCustom','termsUrl','additionalNotes',
    'mainImageTitle','gridTitle','gridCap1','gridCap2','gridCap3','gridCap4','sellerEntity'];
  const state={};
  fields.forEach(f=>{const el=document.getElementById(f);if(el)state[f]=el.value;});
  state.includePage2=document.getElementById('includePage2').checked;
  state.currency=currency;
  state.productRows=productRows;
  state.serviceRows=serviceRows;
  state.rowCounter=rowCounter;
  state.svcCounter=svcCounter;
  return state;
}
function setFormState(s){
  const fields=['quoteDate','expirationDate','quoteName','repName','repEmail','repPhone',
    'customerName','customerEmail','customerPhone','customerCompany',
    'customerStreet','customerZip','customerCity','customerState',
    'taxRate','shippingPrice',
    'deliveryStreet','deliveryZip','deliveryCity','deliveryState',
    'deliveryTerm','deliveryTime','deliveryTimeCustom','paymentTerms','paymentTermsCustom','termsUrl','additionalNotes',
    'mainImageTitle','gridTitle','gridCap1','gridCap2','gridCap3','gridCap4','sellerEntity'];
  fields.forEach(f=>{const el=document.getElementById(f);if(el&&s[f]!==undefined)el.value=s[f];});
  // Show custom fields if "Other" was saved
  if(s.deliveryTime==='__custom__')document.getElementById('deliveryTimeCustom').classList.remove('hidden');
  if(s.paymentTerms==='__custom__')document.getElementById('paymentTermsCustom').classList.remove('hidden');
  if(s.includePage2!==undefined)document.getElementById('includePage2').checked=s.includePage2;
  if(s.currency)setCurrency(s.currency);
  if(s.productRows)productRows=s.productRows;
  if(s.serviceRows)serviceRows=s.serviceRows;
  if(s.rowCounter)rowCounter=s.rowCounter;
  if(s.svcCounter)svcCounter=s.svcCounter;
  renderProductRows();renderServiceRows();updatePreview();
}
function saveDraft(){localStorage.setItem('artome-quote-v2',JSON.stringify(getFormState()));alert('Draft saved!');}
function loadDraft(){const d=localStorage.getItem('artome-quote-v2');if(!d){alert('No saved draft.');return;}setFormState(JSON.parse(d));alert('Draft loaded!');}
function resetForm(){
  if(!confirm('Reset all fields?'))return;
  productRows=[];serviceRows=[];rowCounter=0;svcCounter=0;
  uploadedImages={mainImage:null,gridImg1:null,gridImg2:null,gridImg3:null,gridImg4:null};
  document.querySelectorAll('.img-upload-area img').forEach(i=>i.remove());
  document.querySelectorAll('.img-upload-area .placeholder').forEach(p=>p.textContent='Click or drag to upload');
  document.querySelectorAll('.section-body input,.section-body textarea').forEach(el=>{
    if(el.type==='checkbox')el.checked=el.id==='includePage2';
    else if(el.type==='file')el.value='';
    else el.value=el.defaultValue||'';
  });
  document.querySelectorAll('.section-body select').forEach(el=>el.selectedIndex=0);
  initDefaults();renderProductRows();renderServiceRows();updatePreview();
}

// === INIT ===
function initDefaults(){
  document.getElementById('quoteDate').value=today();
  document.getElementById('expirationDate').value=addDays(today(),30);
  updateStateFields();
}
document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('topbar-logo').src=LOGO_BLACK_B64;
  initDefaults();
  document.querySelectorAll('input,select,textarea').forEach(el=>{
    el.addEventListener('input',debouncedPreview);
    el.addEventListener('change',debouncedPreview);
  });
  let ast;document.addEventListener('input',()=>{clearTimeout(ast);ast=setTimeout(()=>{localStorage.setItem('artome-quote-v2',JSON.stringify(getFormState()));},3000);});
  window.addEventListener('beforeunload',e=>{if(productRows.length>0||document.getElementById('customerName').value){e.preventDefault();e.returnValue='';}});
  updatePreview();
});
</script>
